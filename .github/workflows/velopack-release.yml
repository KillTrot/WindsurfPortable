name: build-and-release

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/velopack-release.yml'
      - 'WindsurfPortable.UI/**'
      - 'WindsurfPortable.Core/**'

permissions:
  contents: write

jobs:
  version_guard:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.version-guard.outputs.should_release }}
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Version from Project File
        id: get-version
        shell: bash
        run: echo "version=$(grep -oE '<Version>[^<]+' WindsurfPortable.UI/WindsurfPortable.UI.csproj | sed 's/<Version>//')" >> $GITHUB_OUTPUT

      - name: Check version increased
        id: version-guard
        shell: bash
        run: |
          git fetch --tags --force
          latest_tag=$(git tag -l 'v*' --sort=-v:refname | head -n 1)
          latest_ver=${latest_tag#v}
          if [ -z "$latest_ver" ] || [ "$latest_ver" = "$latest_tag" ]; then
            latest_ver="0.0.0"
          fi

          new_ver="${{ steps.get-version.outputs.version }}"
          highest=$(printf "%s\n%s\n" "$latest_ver" "$new_ver" | sort -V | tail -n 1)

          if [ "$highest" != "$new_ver" ] || [ "$latest_ver" = "$new_ver" ]; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "Latest tag version: $latest_ver; csproj version: $new_ver; skipping release."
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "Latest tag version: $latest_ver; csproj version: $new_ver; will release."
          fi

  build_pack:
    needs: version_guard
    if: needs.version_guard.outputs.should_release == 'true'
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows (win-x64)
            os: ubuntu-latest
            rid: win-x64
            runtime: win-x64
            mainExe: WindsurfPortable.exe
            vpkOs: win
            iconMode: ico

          - name: Windows (win-arm64)
            os: ubuntu-latest
            rid: win-arm64
            runtime: win-arm64
            mainExe: WindsurfPortable.exe
            vpkOs: win
            iconMode: ico

          - name: Linux (linux-x64)
            os: ubuntu-latest
            rid: linux-x64
            runtime: linux-x64
            mainExe: WindsurfPortable
            vpkOs: linux
            iconMode: png

          - name: Linux (linux-x64-deb)
            os: ubuntu-latest
            rid: linux-x64
            runtime: linux-x64
            mainExe: WindsurfPortable
            vpkOs: linux
            iconMode: png
            linuxDeb: true

          - name: macOS (osx-x64)
            os: macos-14
            rid: osx-x64
            runtime: osx-x64
            mainExe: WindsurfPortable
            vpkOs: osx
            iconMode: icns

          - name: macOS (osx-arm64)
            os: macos-latest
            rid: osx-arm64
            runtime: osx-arm64
            mainExe: WindsurfPortable
            vpkOs: osx
            iconMode: icns

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Add dotnet tools to PATH
        shell: bash
        run: |
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
          if [ -n "${USERPROFILE:-}" ]; then
            echo "$USERPROFILE/.dotnet/tools" >> "$GITHUB_PATH"
          fi

      - name: Install/Update vpk
        shell: bash
        run: dotnet tool update -g vpk

      - name: Install Linux dependencies
        if: startsWith(matrix.os, 'ubuntu-')
        shell: bash
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y squashfs-tools
          sudo apt-get install -y libfuse2 || sudo apt-get install -y libfuse2t64

      - name: Install ImageMagick
        if: matrix.iconMode == 'ico' && startsWith(matrix.os, 'ubuntu-')
        shell: bash
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Publish
        shell: bash
        run: |
          dotnet publish WindsurfPortable.UI/WindsurfPortable.UI.csproj \
            -c Release \
            -r "${{ matrix.rid }}" \
            --self-contained true \
            -p:RuntimeIdentifiers="${{ matrix.rid }}" \
            -o "publish/${{ matrix.rid }}"

      - name: Generate macOS .icns
        if: matrix.iconMode == 'icns'
        shell: bash
        run: |
          set -e
          mkdir -p artifacts/icon.iconset
          src_png="WindsurfPortable.png"
          sips -z 16 16 "$src_png" --out artifacts/icon.iconset/icon_16x16.png
          sips -z 32 32 "$src_png" --out artifacts/icon.iconset/icon_16x16@2x.png
          sips -z 32 32 "$src_png" --out artifacts/icon.iconset/icon_32x32.png
          sips -z 64 64 "$src_png" --out artifacts/icon.iconset/icon_32x32@2x.png
          sips -z 128 128 "$src_png" --out artifacts/icon.iconset/icon_128x128.png
          sips -z 256 256 "$src_png" --out artifacts/icon.iconset/icon_128x128@2x.png
          sips -z 256 256 "$src_png" --out artifacts/icon.iconset/icon_256x256.png
          sips -z 512 512 "$src_png" --out artifacts/icon.iconset/icon_256x256@2x.png
          sips -z 512 512 "$src_png" --out artifacts/icon.iconset/icon_512x512.png
          sips -z 1024 1024 "$src_png" --out artifacts/icon.iconset/icon_512x512@2x.png
          iconutil -c icns artifacts/icon.iconset -o artifacts/icon.icns

      - name: Generate Windows .ico
        if: matrix.iconMode == 'ico'
        shell: bash
        run: |
          set -e
          mkdir -p artifacts
          if command -v magick >/dev/null 2>&1; then
            magick WindsurfPortable.UI/Assets/WindsurfPortable.ico artifacts/icon.ico
          else
            cp WindsurfPortable.UI/Assets/WindsurfPortable.ico artifacts/icon.ico
          fi

      - name: Velopack pack
        if: matrix.linuxDeb != true
        shell: bash
        run: |
          set -e

          icon_arg=""
          if [ "${{ matrix.iconMode }}" = "png" ]; then
            icon_arg="--icon WindsurfPortable.png"
          elif [ "${{ matrix.iconMode }}" = "ico" ]; then
            icon_arg="--icon WindsurfPortable.UI/Assets/WindsurfPortable.ico"
          elif [ "${{ matrix.iconMode }}" = "icns" ]; then
            icon_arg="--icon artifacts/icon.icns"
          fi

          shortcut_arg=""
          if [ "${{ matrix.vpkOs }}" = "win" ]; then
            shortcut_arg="--shortcuts StartMenuRoot"
          fi

          mkdir -p "Releases/${{ matrix.name }}"

          if [ "${{ matrix.vpkOs }}" = "win" ] && [ "${{ runner.os }}" != "Windows" ]; then
            vpk '[win]' pack \
              --packId WindsurfPortable \
              --packVersion "${{ needs.version_guard.outputs.version }}" \
              --packDir "publish/${{ matrix.rid }}" \
              --mainExe "${{ matrix.mainExe }}" \
              --runtime "${{ matrix.runtime }}" \
              --channel "${{ matrix.rid }}" \
              --outputDir "Releases/${{ matrix.rid }}" \
              --packTitle "WindsurfPortable" \
              --packAuthors "KillTrot" \
              $shortcut_arg \
              $icon_arg
            exit 0
          fi

          vpk pack \
            --packId WindsurfPortable \
            --packVersion "${{ needs.version_guard.outputs.version }}" \
            --packDir "publish/${{ matrix.rid }}" \
            --mainExe "${{ matrix.mainExe }}" \
            --runtime "${{ matrix.runtime }}" \
            --channel "${{ matrix.rid }}" \
            --outputDir "Releases/${{ matrix.rid }}" \
            --packTitle "WindsurfPortable" \
            --packAuthors "KillTrot" \
            $shortcut_arg \
            $icon_arg

      - name: Build Linux .deb
        if: matrix.linuxDeb == true
        shell: bash
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y dpkg-dev

          ver="${{ needs.version_guard.outputs.version }}"
          pkgdir="debroot"
          rm -rf "$pkgdir"
          mkdir -p "$pkgdir/DEBIAN" "$pkgdir/opt/WindsurfPortable" "$pkgdir/usr/bin" "$pkgdir/usr/share/applications" "$pkgdir/usr/share/pixmaps"

          python3 - <<'PY'
          import os
          from pathlib import Path

          pkgdir = Path(os.environ['PKGDIR'])
          ver = os.environ['VER']

          (pkgdir / 'DEBIAN' / 'control').write_text(
              "\n".join([
                  "Package: windsurfportable",
                  f"Version: {ver}",
                  "Section: utils",
                  "Priority: optional",
                  "Architecture: amd64",
                  "Maintainer: KillTrot",
                  "Description: WindsurfPortable launcher",
                  "",
              ]),
              encoding='utf-8'
          )

          (pkgdir / 'usr' / 'bin' / 'windsurfportable').write_text(
              "#!/bin/sh\nexec /opt/WindsurfPortable/WindsurfPortable \"$@\"\n",
              encoding='utf-8'
          )

          (pkgdir / 'usr' / 'share' / 'applications' / 'windsurfportable.desktop').write_text(
              "\n".join([
                  "[Desktop Entry]",
                  "Type=Application",
                  "Name=WindsurfPortable",
                  "Exec=/usr/bin/windsurfportable",
                  "Icon=windsurfportable",
                  "Terminal=false",
                  "Categories=Development;",
                  "",
              ]),
              encoding='utf-8'
          )
          PY
        env:
          VER: ${{ needs.version_guard.outputs.version }}
          PKGDIR: debroot

      - name: Populate Linux .deb payload
        if: matrix.linuxDeb == true
        shell: bash
        run: |
          set -e
          pkgdir="debroot"
          cp -r "publish/${{ matrix.rid }}/." "$pkgdir/opt/WindsurfPortable/"
          chmod +x "$pkgdir/usr/bin/windsurfportable"
          cp WindsurfPortable.png "$pkgdir/usr/share/pixmaps/windsurfportable.png"

          mkdir -p Releases/linux-x64-deb
          dpkg-deb --build "$pkgdir" "Releases/linux-x64-deb/windsurfportable_${{ needs.version_guard.outputs.version }}_amd64.deb"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: releases-${{ matrix.rid }}${{ matrix.linuxDeb && '-deb' || '' }}
          path: Releases/

  upload_release:
    needs: [version_guard, build_pack]
    if: needs.version_guard.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge Releases
        shell: bash
        run: |
          set -e
          mkdir -p Releases

          # download-artifact extracts each artifact into its own folder under ./artifacts.
          # Because we upload with `path: Releases/`, the artifact root contains subfolders like
          # win-x64/, osx-arm64/, etc (not a nested Releases/ folder).
          for d in artifacts/*; do
            if [ -d "$d" ]; then
              rsync -a "$d/" Releases/
            fi
          done

      - name: Create/Update GitHub Release assets
        shell: bash
        run: |
          set -e

          tag="v${{ needs.version_guard.outputs.version }}"
          title="WindsurfPortable ${{ needs.version_guard.outputs.version }}"

          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$title" --notes ""
          fi

          mapfile -t files < <(find Releases -type f | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release files found under Releases/."
            exit 1
          fi

          for file in "${files[@]}"; do
            echo "Uploading $(basename "$file")"
            for attempt in 1 2 3; do
              if gh release upload "$tag" "$file" --clobber; then
                break
              fi

              if [ "$attempt" -eq 3 ]; then
                echo "Failed to upload $file after 3 attempts."
                exit 1
              fi

              echo "Retrying upload for $file (attempt $((attempt + 1))/3)"
              sleep 5
            done
          done

          gh release edit "$tag" --title "$title" --latest
